<table class="w-full text-sm">
{% for item in data %}
<tr class="{% if not forloop.last %}border-b border-base-100 dark:border-base-800{% endif %}">
    <td class="py-2 pr-4 text-base-500 dark:text-base-400 whitespace-nowrap w-1/4">{{ item.label }}</td>
    <td class="py-2 select-all">{{ item.value }}</td>
</tr>
{% empty %}
<tr><td>-</td></tr>
{% endfor %}
</table>
